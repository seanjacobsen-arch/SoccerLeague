   4. In Firestore Rules, something like this is enough for a private

        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {

   ========================================================================= */

// If Firebase fails to initialize (bad config, blocked network, config
// still just placeholders), the app should still render — just without
// saving working. A crash here must never take down the whole page.
let db = null;
let firebaseInitError = null;
try {
  firebase.initializeApp(firebaseConfig);

} catch (err) {
  firebaseInitError = err;
  console.error("Firebase failed to initialize:", err);

// Firestore calls against an unreachable/invalid project don't reject
// quickly -- the SDK assumes a transient network blip and keeps retrying.
// Without a timeout, a bad config leaves the UI stuck on a loading spinner
// forever instead of falling back to defaults.
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error("Timed out contacting storage")), ms)),
  ]);
}

async function storageGet(key) {
  if (!db) throw new Error("Storage not configured (Firebase did not initialize)");
  const doc = await withTimeout(db.collection("picks").doc(key).get(), 8000);
  return doc.exists ? { value: JSON.stringify(doc.data()) } : null;
}
async function storageSet(key, valueObj) {
  if (!db) throw new Error("Storage not configured (Firebase did not initialize)");
  await withTimeout(db.collection("picks").doc(key).set(valueObj), 8000);
  return true;
}

/* =========================================================================
   LAYER 2 — recommender logic (identical to the Claude-artifact version)
   ========================================================================= */

function projectClubVibe(club) {
  const { pace, technicality, discipline } = club.playstyle;
  return { control: (discipline + (10 - pace)) / 2, star: (technicality + (10 - discipline)) / 2 };
}
function avg(records, key) {
  const list = Object.values(records);
  return list.reduce((s, r) => s + r[key], 0) / list.length;
}
function groupVibe(records) { return { control: avg(records, "control"), star: avg(records, "star") }; }

function accessMultiplier(club, records) {
  const league = LEAGUE_META[club.leagueId];
  const list = Object.values(records);
  const covered = list.filter((r) => league.streaming.some((svc) => r.streaming[svc])).length;
  return { multiplier: Math.max(0.25, covered / list.length), covered, total: list.length, league };
}

function timeMultiplier(club, records) {
  const league = LEAGUE_META[club.leagueId];
  const list = Object.values(records);
  const covered = list.filter((r) => {
    const opt = KICKOFF_OPTIONS.find((o) => o.value === r.earliestET);
    return !opt || opt.hour === -1 || league.typicalKickoffET >= opt.hour;
  }).length;
  return { multiplier: Math.max(0.25, covered / list.length), covered, total: list.length, typicalET: league.typicalKickoffET };
}

function loyaltyMultiplier(club, records) {
  const list = Object.values(records);
  const loveCount = list.filter((r) => r.loveClub === club.id).length;
  const hateCount = list.filter((r) => r.hateClub === club.id).length;
  if (hateCount > 0) return { multiplier: 0.1, loveCount, hateCount };
  if (loveCount > 0) return { multiplier: Math.min(2, 1 + 0.6 * loveCount), loveCount, hateCount };
  return { multiplier: 1, loveCount, hateCount };
}

function preferenceScore(club, records) {
  const gVibe = groupVibe(records);
  const cVibe = projectClubVibe(club);
  const vibeDist = Math.hypot(gVibe.control - cVibe.control, gVibe.star - cVibe.star);
  const vibeFit = Math.max(0, (1 - vibeDist / Math.hypot(9, 9)) * 10);
  const groupDrama = avg(records, "dynastyDrama");
  const balance = LEAGUE_META[club.leagueId].competitiveBalance;
  const balanceFit = Math.max(0, 10 - Math.abs(groupDrama - balance) * (10 / 9));
  const groupUnderdog = avg(records, "underdogAffinity");
  const underdogFit = Math.max(0, 10 - Math.abs(groupUnderdog - club.underdogScore) * (10 / 9));
  return { vibeFit, balanceFit, underdogFit, cVibe, gVibe };
}

// ---- Debate & Alignment: consensus + tension ----

function debateAvg(records, key) {
  const list = Object.values(records);
  return list.reduce((s, r) => s + r.debate[key], 0) / list.length;
}

function debateStdev(records, key) {
  const list = Object.values(records).map((r) => r.debate[key]);
  const mean = list.reduce((s, v) => s + v, 0) / list.length;
  const variance = list.reduce((s, v) => s + (v - mean) ** 2, 0) / list.length;
  return Math.sqrt(variance);
}

// A dimension is a "Group Tension Point" if the spread of opinion is wide
// relative to the 1-5 scale (stdev >= 1.1 is a real split, not just noise).
function groupTensionPoints(records) {
  return DEBATE_DIMENSIONS
    .map((d) => ({ ...d, avg: debateAvg(records, d.key), stdev: debateStdev(records, d.key) }))
    .filter((d) => d.stdev >= 1.1)
    .sort((a, b) => b.stdev - a.stdev);
}

// Maps a 1-5 group-average priority onto the 1-10 scale used by league/club
// attributes, so it can be compared directly via absolute difference.
function scaleTo10(avg1to5) {
  return ((avg1to5 - 1) / 4) * 9 + 1;
}

function debateFit(club, records) {
  const league = LEAGUE_META[club.leagueId];
  const cVibe = projectClubVibe(club);

  const goalDensityAvg = debateAvg(records, "goalDensity");
  const desiredChaos = scaleTo10(goalDensityAvg);
  const clubChaos = 10 - cVibe.control;
  const goalDensityFit = Math.max(0, 10 - Math.abs(desiredChaos - clubChaos) * (10 / 9));

  const narrativeAvg = debateAvg(records, "narrativeFocus");
  const desiredUnderdogForNarrative = scaleTo10(narrativeAvg);
  const narrativeFocusFit = Math.max(0, 10 - Math.abs(desiredUnderdogForNarrative - club.underdogScore) * (10 / 9));

  const clAvg = debateAvg(records, "clPrestige");
  const desiredPrestige = scaleTo10(clAvg);
  const clPrestigeFit = Math.max(0, 10 - Math.abs(desiredPrestige - league.continentalPrestige) * (10 / 9));

  const relegationAvg = debateAvg(records, "relegationDrama");
  const desiredRelegationDrama = scaleTo10(relegationAvg);
  const relegationDramaFit = Math.max(0, 10 - Math.abs(desiredRelegationDrama - league.relegationDrama) * (10 / 9));

  const usmntAvg = debateAvg(records, "usmntExposure");
  const desiredUsmnt = scaleTo10(usmntAvg);
  const usmntBaseFit = Math.max(0, 10 - Math.abs(desiredUsmnt - league.usmntConcentration) * (10 / 9));
  const usmntClubBonus = club.nations.includes("USA") ? (usmntAvg - 1) / 4 * 2 : 0; // up to +2 if club has US talent and it matters
  const usmntExposureFit = Math.min(10, usmntBaseFit + usmntClubBonus);

  const antiDomAvg = debateAvg(records, "antiDominance");
  const desiredParity = scaleTo10(antiDomAvg);
  const antiDominanceFit = Math.max(0, 10 - Math.abs(desiredParity - league.competitiveBalance) * (10 / 9));

  const atmosphereAvg = debateAvg(records, "stadiumAtmosphere");
  const desiredAtmosphere = scaleTo10(atmosphereAvg);
  const stadiumAtmosphereFit = Math.max(0, 10 - Math.abs(desiredAtmosphere - club.rivalry.intensity) * (10 / 9));

  const learningAvg = debateAvg(records, "learningCurve");
  const desiredUnderdogForLearning = scaleTo10(learningAvg);
  const learningCurveFit = Math.max(0, 10 - Math.abs(desiredUnderdogForLearning - club.underdogScore) * (10 / 9));

  const fits = {
    goalDensity: { avg: goalDensityAvg, fit: goalDensityFit },
    narrativeFocus: { avg: narrativeAvg, fit: narrativeFocusFit },
    clPrestige: { avg: clAvg, fit: clPrestigeFit },
    relegationDrama: { avg: relegationAvg, fit: relegationDramaFit },
    usmntExposure: { avg: usmntAvg, fit: usmntExposureFit },
    antiDominance: { avg: antiDomAvg, fit: antiDominanceFit },
    stadiumAtmosphere: { avg: atmosphereAvg, fit: stadiumAtmosphereFit },
    learningCurve: { avg: learningAvg, fit: learningCurveFit },
  };

  const DEBATE_WEIGHT = 0.35; // per-dimension weight; 8 dims max ~28pts, comparable to the original ~16pt max
  const debateTotal = Object.values(fits).reduce((s, f) => s + f.fit, 0) * DEBATE_WEIGHT;

  return { fits, debateTotal };
}

function tallyNations(records) {
  const votes = {};
  Object.values(records).forEach((r) => [r.tactical, r.enjoyable].forEach((n) => { if (n) votes[n] = (votes[n] || 0) + 1; }));
  let top = null, max = 0;
  Object.entries(votes).forEach(([n, c]) => { if (c > max) { max = c; top = n; } });
  return { topNation: top };
}

function highDramaPreference(records) {
  const list = Object.values(records);
  const chaosVotes = list.filter((r) => {
    const opt = ALL_NATIONS.find((o) => o.nation === r.enjoyable);
    return opt && opt.style === "chaos";
  }).length;
  return chaosVotes > list.length / 2;
}

function calculateClubFit(club, records) {
  const pref = preferenceScore(club, records);
  const access = accessMultiplier(club, records);
  const time = timeMultiplier(club, records);
  const loyalty = loyaltyMultiplier(club, records);
  const drama = highDramaPreference(records);
  const { topNation } = tallyNations(records);
  const debate = debateFit(club, records);

  const rivalryBonus = drama ? club.rivalry.intensity * 0.4 : 0;
  const nationalMatch = topNation ? club.nations.includes(topNation) : false;
  const nationalBoost = nationalMatch ? 2 : 0;

  const rawTotal = pref.vibeFit + pref.balanceFit * 0.6 + pref.underdogFit * 0.6
    + rivalryBonus + nationalBoost + debate.debateTotal;
  const finalScore = rawTotal * access.multiplier * time.multiplier * loyalty.multiplier;

  return { club, finalScore, rawTotal, pref, access, time, loyalty, drama, rivalryBonus, nationalMatch, nationalBoost, topNation, debate };
}

function rankClubs(records) {
  return CLUB_DATA.map((c) => calculateClubFit(c, records)).sort((a, b) => b.finalScore - a.finalScore);
}

function fmtHour(h) {
  const hr = Math.floor(h);
  const min = h % 1 === 0.5 ? "30" : "00";
  return `${hr}:${min} ET`;
}

function debateNarration(result) {
  // Pick the 1-2 debate dimensions with the strongest group conviction
  // (avg farthest from the neutral midpoint of 3) AND a good fit for this
  // club, matching the required output format: "Based on your group's high
  // priority for X (4.8/5) ... [club] is your recommended pick."
  const entries = DEBATE_DIMENSIONS.map((d) => {
    const f = result.debate.fits[d.key];
    return { ...d, avg: f.avg, fit: f.fit, conviction: Math.abs(f.avg - 3) };
  }).filter((d) => d.conviction >= 0.5 && d.fit >= 6);
  entries.sort((a, b) => b.conviction * b.fit - a.conviction * a.fit);
  return entries.slice(0, 2).map((d) => {
    const pole = d.avg >= 3 ? d.right : d.left;
    return `a high priority on ${d.label} (${d.avg.toFixed(1)}/5, leaning "${pole}")`;
  });
}

function buildScoutingCopy(result, rank) {
  const { club, access, time, loyalty, pref, drama, rivalryBonus, nationalMatch, topNation } = result;
  const controlWord = pref.gVibe.control >= 6 ? "control-minded" : pref.gVibe.control <= 4 ? "drawn to chaos" : "split between control and chaos";
  const starWord = pref.gVibe.star >= 6 ? "leaning toward individual flair" : pref.gVibe.star <= 4 ? "collective-strategy people" : "balanced between stars and systems";
  const parts = [];

  const debateReasons = debateNarration(result);
  if (debateReasons.length) {
    parts.push(`Based on your group's ${debateReasons.join(" and ")}, ${club.name} is a strong match.`);
  }

  parts.push(`The group reads as ${controlWord} and ${starWord} — ${club.name}'s ${club.tacticalDNA.toLowerCase()} identity lands ${pref.vibeFit >= 7 ? "squarely" : pref.vibeFit >= 5 ? "reasonably" : "loosely"} in that zone.`);

  if (access.covered === access.total) parts.push(`Everyone submitted already has ${access.league.name} access via ${access.league.streaming.join(" or ")}.`);
  else if (access.covered === 0) parts.push(`Nobody's submitted profile has ${access.league.streaming.join(" or ")} yet — real barrier for ${access.league.name}.`);
  else parts.push(`${access.covered} of ${access.total} have ${access.league.streaming.join(" or ")}, which trims the score but isn't fatal.`);

  if (time.covered === time.total) parts.push(`Kickoff time is a non-issue — ${access.league.name} typically kicks off around ${fmtHour(time.typicalET)}, which works for everyone.`);
  else if (time.covered === 0) parts.push(`Nobody's up for a ${fmtHour(time.typicalET)} kickoff, which is ${access.league.name}'s typical slot — that's the single biggest drag on this pick.`);
  else parts.push(`${time.covered} of ${time.total} of you can realistically watch a ${fmtHour(time.typicalET)} kickoff, which is when ${access.league.name} usually plays.`);

  if (drama && rivalryBonus > 0) parts.push(`Since enjoyment picks skew chaotic, ${club.rivalry.name} (intensity ${club.rivalry.intensity}/10) counts as a real selling point.`);
  if (nationalMatch) parts.push(`${topNation} came up as a shared World Cup favorite, and ${club.name}'s roster carries heavy ${topNation} representation.`);
  if (loyalty.hateCount > 0) parts.push(`Heads up — someone in the group really doesn't want to watch ${club.name}. That's dragging this pick down hard on purpose.`);
  else if (loyalty.loveCount > 0) parts.push(`Someone in the group already has a soft spot for ${club.name}, which nudges this one up.`);

  return `#${rank} ${club.name.toUpperCase()} (${access.league.name}) — ${result.finalScore.toFixed(1)} pts. ` + parts.join(" ");
}

        <button onClick={onGoResults} className="w-full py-2.5 rounded-lg font-semibold text-sm border" style={{ borderColor: COLORS.line, color: COLORS.chalk, fontFamily: FONT_DISPLAY, letterSpacing: "0.03em" }}>
          VIEW GROUP RESULTS
        </button>
      </div>
    </div>
  );
}

function TensionPoints({ records }) {
  const points = useMemo(() => groupTensionPoints(records), [records]);
  if (!points.length) return null;
  return (
    <div className="rounded-lg border p-4 mb-6" style={{ background: "#2A1810", borderColor: COLORS.red }}>
      <div className="text-[11px] uppercase tracking-[0.2em] mb-2" style={{ color: COLORS.red, fontFamily: FONT_MONO }}>⚠ Group Tension Points</div>
      <p className="text-[12px] mb-2" style={{ color: COLORS.faint }}>
        The group is genuinely split on these — worth a real conversation before you lock in a pick, since the algorithm can only average opinions, not resolve them.
      </p>
      <ul className="space-y-1">
        {points.map((p) => (
          <li key={p.key} className="text-[12px]" style={{ color: COLORS.chalk }}>
            <span style={{ fontFamily: FONT_MONO, color: COLORS.gold }}>{p.label}</span>
            {" — "}average {p.avg.toFixed(1)}/5, but opinions range widely (spread: {p.stdev.toFixed(1)}).
          </li>
        ))}
      </ul>
    </div>
  );
}

function ResultsPanel({ records, onBack, refreshing, onRefresh }) {
  const filled = useMemo(() => {
    const out = {};
    FRIEND_IDS.forEach((id) => { out[id] = records[id] || DEFAULT_RECORD(); });
    return out;
  }, [records]);
  const ranked = useMemo(() => rankClubs(filled), [filled]);
  const submissionCount = Object.values(records).filter((r) => r && r.submitted).length;

  return (
    <div className="min-h-screen px-6 py-8" style={{ background: COLORS.pitch }}>
      <div className="max-w-3xl mx-auto">
        <div className="flex items-center justify-between mb-1">
          <div className="text-[11px] uppercase tracking-[0.2em]" style={{ color: COLORS.gold, fontFamily: FONT_MONO }}>Group Soccer Team Recommender</div>
          <button onClick={onRefresh} className="text-[11px] underline" style={{ color: COLORS.muted, fontFamily: FONT_MONO }}>{refreshing ? "refreshing…" : "refresh"}</button>
        </div>
        <h1 className="text-5xl font-bold mb-3" style={{ fontFamily: FONT_DISPLAY, color: COLORS.chalk }}>PICK YOUR CLUB</h1>
        <p className="text-[13px] mb-6" style={{ color: COLORS.faint }}>
          {submissionCount} of {FRIEND_IDS.length} of you have saved picks. Anyone who hasn't submitted yet is scored as neutral until they check in.
        </p>

        <TacticsBoard ranked={ranked} records={filled} title="The Tactics Board — group vs. all 20 clubs" />

        <div className="mt-6">
          <TensionPoints records={filled} />
        </div>

        <div className="text-[11px] uppercase tracking-[0.2em] mb-4" style={{ color: COLORS.gold, fontFamily: FONT_MONO }}>Scouting Report — Top 5</div>
        <div className="grid gap-4 mb-6">
          {ranked.slice(0, 5).map((r, i) => <ScoutingCard key={r.club.id} result={r} rank={i + 1} />)}
        </div>

        <button onClick={onBack} className="w-full py-2.5 rounded-lg font-semibold text-sm border" style={{ borderColor: COLORS.line, color: COLORS.chalk, fontFamily: FONT_DISPLAY, letterSpacing: "0.03em" }}>
          BACK TO MY LOCKER
        </button>
      </div>
    </div>
  );
}

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [record, setRecord] = useState(DEFAULT_RECORD());
  const [saveState, setSaveState] = useState("idle");
  const [view, setView] = useState("input");
  const [allRecords, setAllRecords] = useState({});
  const [refreshing, setRefreshing] = useState(false);
  const [loading, setLoading] = useState(false);

  // Backfills any fields missing from an older saved record (e.g. one saved
  // before the Debate & Alignment module existed) so loading old data never
  // crashes the app on a missing key like record.debate.goalDensity.
  const mergeWithDefaults = (saved) => {
    const def = DEFAULT_RECORD();
    if (!saved || typeof saved !== "object") return def;
    return {
      ...def,
      ...saved,
      streaming: { ...def.streaming, ...(saved.streaming || {}) },
      debate: { ...def.debate, ...(saved.debate || {}) },
    };
  };

  const loadOwnRecord = useCallback(async (userId) => {
    setLoading(true);
    try {
      const res = await storageGet(userId);
      setRecord(res && res.value ? mergeWithDefaults(JSON.parse(res.value)) : DEFAULT_RECORD());
    } catch { setRecord(DEFAULT_RECORD()); } finally { setLoading(false); }
  }, []);

  const loadAllRecords = useCallback(async () => {
    setRefreshing(true);
    const out = {};
    for (const id of FRIEND_IDS) {
      try {
        const res = await storageGet(id);
        if (res && res.value) out[id] = mergeWithDefaults(JSON.parse(res.value));
      } catch { /* not submitted yet */ }
    }
    setAllRecords(out);
    setRefreshing(false);
  }, []);

  useEffect(() => { if (currentUser) loadOwnRecord(currentUser); }, [currentUser, loadOwnRecord]);

  const handleSave = async () => {
    setSaveState("saving");
    try {
      const toSave = { ...record, submitted: true };
      const ok = await storageSet(currentUser, toSave);
      if (ok) { setRecord(toSave); setSaveState("saved"); setTimeout(() => setSaveState("idle"), 1800); }
      else setSaveState("error");
    } catch { setSaveState("error"); }
  };

  const goResults = async () => { await loadAllRecords(); setView("results"); };

  const banner = firebaseInitError || !db ? (
    <div style={{ background: "#B23A2E", color: "#F3EFE4", padding: "10px 16px", fontSize: "13px", textAlign: "center", fontFamily: FONT_MONO }}>
      ⚠ Storage isn't configured yet — picks won't be saved. Paste your Firebase config near the top of this file.
    </div>
  ) : null;

  if (!currentUser) return <>{banner}<LoginScreen onLogin={setCurrentUser} /></>;
  if (loading) return <>{banner}<div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.pitch, color: COLORS.chalk, fontFamily: FONT_MONO }}>Loading your locker…</div></>;

  const submissionCount = Object.values(allRecords).filter((r) => r && r.submitted).length || (record.submitted ? 1 : 0);

  if (view === "results") {
    return <>{banner}<ResultsPanel records={allRecords} onBack={() => setView("input")} refreshing={refreshing} onRefresh={loadAllRecords} /></>;
  }
  return <>{banner}<InputPanel userId={currentUser} record={record} setRecord={setRecord} onSave={handleSave} saveState={saveState} onGoResults={goResults} submissionCount={submissionCount} /></>;
}

// Top-level error boundary: if any component throws during render (a bad
// saved value, an unexpected null, etc.), show a real message instead of
// leaving the page blank.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Render error:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ fontFamily: "sans-serif", maxWidth: 640, margin: "60px auto", padding: 24, background: "#2A1810", color: "#F3EFE4", borderRadius: 10, border: "1px solid #B23A2E", lineHeight: 1.5 }}>
          <h2 style={{ marginTop: 0, color: "#C7A046" }}>Something broke while rendering</h2>
          <p>{String(this.state.error.message || this.state.error)}</p>
          <p style={{ opacity: 0.75, fontSize: 13 }}>Open the browser console (F12) for the full stack trace.</p>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
