<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1113" />
  <title>Soccer Dashboard</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Soccer Dashboard</h1>
    <div class="subtitle">Big 5 scores, standings &amp; weekend recaps</div>
  </header>

  <main>
    <!-- Home -->
    <section id="view-home" class="view active">
      <div id="recap-card" class="card card-accent">
        <h2>Weekend Recap</h2>
        <div id="recap-content" class="muted">Loading…</div>
      </div>

      <div id="big-match-card"></div>

      <div class="card">
        <h2>Recent Scores</h2>
        <div id="home-scores" class="muted">Loading…</div>
      </div>

      <div class="card">
        <h2 id="mini-standings-title">Standings Snapshot</h2>
        <div id="mini-standings" class="muted">Loading…</div>
      </div>
    </section>

    <!-- Scores -->
    <section id="view-scores" class="view">
      <div id="scores-content" class="muted">Loading…</div>
    </section>

    <!-- Standings -->
    <section id="view-standings" class="view">
      <select id="league-select" class="league-select"></select>
      <div id="standings-content" class="muted">Loading…</div>
    </section>

    <!-- Notifications / Settings -->
    <section id="view-notifications" class="view">
      <div class="card">
        <h2>Push Notifications</h2>
        <div class="toggle-row">
          <span>Enable match-of-the-week alerts</span>
          <label class="switch">
            <input type="checkbox" id="push-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <div id="push-status" class="status-text"></div>
        <button id="test-push-btn" class="btn-secondary" disabled>Send test push</button>
      </div>

      <div class="card">
        <h2>Queued This Week</h2>
        <div id="queued-content" class="muted">Loading…</div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-view="home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </button>
    <button class="nav-item" data-view="scores">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 4v16"/></svg>
      Scores
    </button>
    <button class="nav-item" data-view="standings">
      <svg viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-6"/></svg>
      Standings
    </button>
    <button class="nav-item" data-view="notifications">
      <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 004 0"/></svg>
      Notifications
    </button>
    <button class="nav-item" data-view="notifications">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
      Settings
    </button>
  </nav>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
